<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 검색 에이전트</title>
  <!-- Widget JavaScript bundle -->
  <script src="https://cloud.google.com/ai/gen-app-builder/client?hl=ko" defer></script>
</head>
<body>
  <!-- Search widget element is not visible by default -->
  <gen-search-widget
    configId="941ded89-1024-4715-b132-1a9ea3264708"
    triggerId="searchWidgetTrigger">
  </gen-search-widget>

  <!-- Element that opens the widget on click. It does not have to be an input -->
  <input placeholder="검색어 입력" id="searchWidgetTrigger" />
</body>
</html>
